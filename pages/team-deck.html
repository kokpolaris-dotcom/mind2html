<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team 全览 · Wanpix.ai</title>
  <style>
    :root {
      --color-background: #0b0f1a;
      --color-surface: rgba(255, 255, 255, 0.04);
      --color-surface-hover: rgba(255, 255, 255, 0.08);
      --color-border: rgba(255, 255, 255, 0.1);
      --color-border-strong: rgba(255, 255, 255, 0.2);
      --color-primary: #818cf8;
      --color-primary-hover: #a5b4fc;
      --color-accent: #22d3ee;
      --color-highlight: #fbbf24;
      --color-magenta: #f472b6;
      --color-emerald: #34d399;
      --color-text: #f8fafc;
      --color-text-secondary: #cbd5e1;
      --color-text-muted: #94a3b8;
      --font-sans: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --font-serif: 'Noto Serif SC', Georgia, serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--color-background);
      color: var(--color-text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .glow-1 { position: fixed; top: -15%; right: -8%; width: 32rem; height: 32rem; z-index: 0; pointer-events: none;
      background: radial-gradient(circle, rgba(129,140,248,0.15) 0%, transparent 60%); }
    .glow-2 { position: fixed; bottom: -15%; left: -10%; width: 30rem; height: 30rem; z-index: 0; pointer-events: none;
      background: radial-gradient(circle, rgba(34,211,238,0.12) 0%, transparent 60%); }

    .page {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 1.25rem 0.5rem;
      border-bottom: 1px solid var(--color-border);
      background: rgba(11, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      position: relative;
    }
    .header-left { display: flex; align-items: center; gap: 0.7rem; }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); box-shadow: 0 0 12px var(--color-primary); }
    .brand-text { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.1em; color: var(--color-text-muted); }
    .title {
      font-family: var(--font-serif);
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.01em;
      color: var(--color-text);
    }
    .title-accent {
      background: linear-gradient(135deg, var(--color-primary-hover), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 0.7rem;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }
    .header-right { display: flex; align-items: center; gap: 0.55rem; }
    .pill {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.05em;
      padding: 0.25rem 0.6rem; border-radius: 9999px;
      border: 1px solid var(--color-border-strong); background: var(--color-surface);
      color: var(--color-text-secondary);
    }
    .pill .num { color: var(--color-accent); font-weight: 700; }
    .back-link {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--color-text-secondary);
      text-decoration: none;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--color-border-strong);
      border-radius: 9999px;
      transition: all 0.2s;
    }
    .back-link:hover { color: var(--color-primary-hover); border-color: var(--color-primary); }

    /* ── Progress Bar ── */
    .progress-track {
      position: absolute;
      left: 0; bottom: -1px;
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.06);
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 8px var(--color-primary);
    }

    /* ── Stage (pitch-deck 风格：slide 叠放，预加载) ── */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f8fafc;
    }
    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }
    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1.25rem;
      border-top: 1px solid var(--color-border);
      background: rgba(11, 15, 26, 0.85);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .footer-left { display: flex; align-items: center; gap: 0.6rem; }
    .kbd-hint {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--color-text-muted);
      display: flex; align-items: center; gap: 0.3rem;
    }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.1rem; height: 1.1rem;
      padding: 0 0.3rem;
      border: 1px solid var(--color-border-strong);
      border-radius: 3px;
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 0.6rem;
    }
    .dots { display: flex; align-items: center; gap: 0.45rem; }
    .dot {
      width: 0.5rem; height: 0.5rem;
      border-radius: 50%;
      background: var(--color-border-strong);
      cursor: pointer;
      transition: all 0.25s;
      border: none;
      padding: 0;
    }
    .dot:hover { background: var(--color-text-secondary); }
    .dot.active {
      width: 1.6rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      box-shadow: 0 0 8px rgba(129,140,248,0.5);
    }
    .footer-right { display: flex; align-items: center; gap: 0.5rem; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 0.85rem;
      border-radius: 0.4rem;
      border: 1px solid var(--color-border-strong);
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--color-surface-hover);
      border-color: var(--color-primary);
      color: var(--color-primary-hover);
    }
    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .nav-btn.primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      border-color: transparent;
      color: #0b0f1a;
    }
    .nav-btn.primary:hover:not(:disabled) {
      filter: brightness(1.1);
      box-shadow: 0 0 12px rgba(129,140,248,0.4);
    }

    ::selection { background: rgba(129,140,248,0.4); color: #fff; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <span class="brand-dot"></span>
        <span class="brand-text">WANPIX.AI · TEAM DECK</span>
        <h1 class="title">团队<span class="title-accent">三页全览</span></h1>
        <span class="subtitle" id="pageSubtitle">/ L1 基础 · L2 AI Native · L3 应用交付</span>
      </div>
      <div class="header-right">
        <span class="pill"><span class="num" id="curIdx">1</span> / 3</span>
        <a href="../index.html" class="back-link">← 首页</a>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar" style="width: 33.33%"></div>
      </div>
    </header>

    <main class="stage" id="stage">
      <!-- 所有 slide 预加载叠放，参考 pitch-deck 模式 -->
    </main>

    <footer class="footer">
      <div class="footer-left">
        <span class="kbd-hint">
          <span class="kbd">←</span><span class="kbd">→</span>
          <span>或</span>
          <span class="kbd">Space</span>
          <span>切换</span>
        </span>
      </div>
      <div class="dots" id="dots"></div>
      <div class="footer-right">
        <button class="nav-btn" id="prevBtn">← 上一页</button>
        <button class="nav-btn primary" id="nextBtn">下一页 →</button>
      </div>
    </footer>
  </div>

  <script>
    const pages = [
      {
        url: 'tech-organization.html',
        title: '技术组织架构',
        subtitle: '/ L1 基础 · L2 AI Native · L3 应用交付'
      },
      {
        url: 'team-capability.html',
        title: '团队能力匹配',
        subtitle: '/ 能力矩阵 × 优先级排布'
      },
      {
        url: 'team-roster.html',
        title: '团队人员花名册',
        subtitle: '/ 23 人矩阵 · 虚拟协作'
      }
    ];

    let cur = 0;

    const stage = document.getElementById('stage');
    const dotsContainer = document.getElementById('dots');
    const curIdx = document.getElementById('curIdx');
    const pageSubtitle = document.getElementById('pageSubtitle');
    const progressBar = document.getElementById('progressBar');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    // 预构建所有 slide（iframe 全部预加载）+ dots
    pages.forEach((p, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');
      const iframe = document.createElement('iframe');
      iframe.src = p.url;
      iframe.title = p.title;
      slide.appendChild(iframe);
      stage.appendChild(slide);

      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.dataset.idx = i;
      dot.setAttribute('aria-label', '第 ' + (i + 1) + ' 页');
      dot.addEventListener('click', () => go(i));
      dotsContainer.appendChild(dot);
    });

    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');

    function go(i) {
      const next = Math.max(0, Math.min(pages.length - 1, i));
      if (next === cur) return;
      cur = next;

      slides.forEach((s, idx) => s.classList.toggle('active', idx === cur));
      dots.forEach((d, idx) => d.classList.toggle('active', idx === cur));
      pageSubtitle.textContent = pages[cur].subtitle;
      curIdx.textContent = cur + 1;
      progressBar.style.width = ((cur + 1) / pages.length * 100) + '%';
      prevBtn.disabled = cur === 0;
      nextBtn.disabled = cur === pages.length - 1;
    }

    prevBtn.addEventListener('click', () => go(cur - 1));
    nextBtn.addEventListener('click', () => go(cur + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); go(cur + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur - 1); }
      else if (e.key === ' ') { e.preventDefault(); go(cur + 1); }
      else if (e.key === 'Home') { e.preventDefault(); go(0); }
      else if (e.key === 'End') { e.preventDefault(); go(pages.length - 1); }
    });

    prevBtn.disabled = cur === 0;
    nextBtn.disabled = cur === pages.length - 1;
  </script>
</body>
</html>
